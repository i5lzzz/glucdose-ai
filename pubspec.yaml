name: insulin_assistant
description: >
  Smart Insulin Assistant — clinically-aware mobile application for
  insulin dose calculation and glucose prediction. SaMD-aware design.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ───────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Dependency Injection ───────────────────────────────────────────
  get_it: ^7.7.0
  injectable: ^2.4.4

  # ── Local Database ─────────────────────────────────────────────────
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # ── Secure Storage ─────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Encryption ────────────────────────────────────────────────────
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # ── AI / ML ───────────────────────────────────────────────────────
  tflite_flutter: ^0.10.4

  # ── Localization ──────────────────────────────────────────────────
  intl: ^0.19.0

  # ── Navigation ───────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── UI Utilities ─────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  icons_plus: ^5.0.0

  # ── Utilities ─────────────────────────────────────────────────────
  dartz: ^0.10.1           # Functional programming / Either monad
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.2
  logger: ^2.4.0
  collection: ^1.18.0
  rxdart: ^0.27.7

  # ── Async ────────────────────────────────────────────────────────
  async: ^2.11.0

  # ── Device / Platform ────────────────────────────────────────────
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2

  # ── Date/Time ────────────────────────────────────────────────────
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ──────────────────────────────────────────────
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  riverpod_generator: ^2.4.3

  # ── Testing ──────────────────────────────────────────────────────
  mocktail: ^1.0.4
  faker: ^2.1.0
  sqflite_common_ffi: ^2.3.4+1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/data/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
